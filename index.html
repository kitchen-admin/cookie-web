<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cookie Kitchen — Never wonder what to cook again. Discover recipes personalized just for you."
    />
    <title>Cookie Kitchen</title>

    <!-- Google Fonts: Bricolage Grotesque -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- ─── Page wrapper ─── -->
    <div class="page">

      <!-- ─── Header: brand (left) + nav (right) ─── -->
      <header class="header">
        <div class="brand">
          <h1 class="brand__name">Cookie Kitchen</h1>
          <p class="brand__tagline">Never wonder what to cook again.</p>
        </div>

        <nav class="nav" aria-label="Legal">
          <a href="#terms" class="nav__link">Terms &amp; Conditions</a>
          <span class="nav__sep" aria-hidden="true">›</span>
          <a href="#privacy" class="nav__link">Privacy Policy</a>
        </nav>
      </header>

      <!-- ─── Hero: mascot illustration ─── -->
      <main class="hero">
        <figure class="hero__figure">
          <img
            src="assets/mascot.png"
            alt="Cookie Kitchen mascot — a cheerful cookie chef surrounded by fresh ingredients"
            class="hero__mascot"
            width="900"
            height="540"
          />
        </figure>
      </main>

      <!-- ─── Orange glow overlay (decorative) ─── -->
      <div class="glow" aria-hidden="true"></div>
    </div>

  </body>
</html>
